<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergency Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0;       font-family: 'Inter', sans-serif; font-weight: 200;}

    /* Introduction */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: url(Background.png) center / cover no-repeat;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .card {
      display: flex;
      position: relative;
      width: 494px;
      height: 308px;
      box-sizing: border-box;
      background:
        linear-gradient(0deg, rgba(131, 131, 131, 0.199) -79.46%, rgba(112, 112, 112, 0.12) 20.54%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.01) 79.46%, rgba(255, 255, 255, 0.04) 179.46%);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        inset 0 -8px 24px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(28px);
      border-radius: 40px;
      transform-style: preserve-3d;
      will-change: transform, box-shadow;
      z-index: 4;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: clamp(0.6px, 0.15vw, 1px);
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.15) 100%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, transparent 10%),
        linear-gradient(315deg, rgba(255, 255, 255, 0.4) 0%, transparent 10%),
        linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.4) 40%, transparent 100%),
        linear-gradient(0deg, transparent 0%, rgba(255, 255, 255, 0.4) 40%, transparent 100%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 1;
    }

    .card::after {
      content: '';
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: -6px;
      top: 6px;
      border-radius: 40px;
      background: transparent;
      box-shadow: 0 22px 38px rgba(10, 10, 10, 0.42);
      filter: blur(6px);
      transform: translateY(6px) scale(0.995);
      z-index: 0;
      pointer-events: none;
    }

    .card-title {
      position: absolute;
      width: 340px;
      left: calc(50% - 340px/2 - 37px);
      top: 40px;
      font-weight: 200;
      font-size: 24px;
      line-height: 29px;
      letter-spacing: -0.04em;
      color: #FFFFFF;
      white-space: nowrap;
      z-index: 2;
    }

    /* Entry fields container */
    .entry-fields {
      position: absolute;
      width: 414px;
      height: 114px;
      left: 40px;
      top: 87px;
      z-index: 2;
    }

    /* Shared input style */
    .input-field {
      position: absolute;
      height: 47px;
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0) -79.46%, rgba(0, 0, 0, 0.12) 20.54%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.01) 79.46%, rgba(255, 255, 255, 0.04) 179.46%);
      border-radius: 10px;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 18px;
      line-height: 22px;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.8);
      padding: 17px 17px;
      backdrop-filter: blur(28px);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        inset 0 -4px 12px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      transform-style: preserve-3d;
    }

    .input-field::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .input-field:focus {
      outline: none;
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0) -79.46%, rgba(0, 0, 0, 0.15) 20.54%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.01) 79.46%, rgba(255, 255, 255, 0.05) 179.46%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 -4px 12px rgba(0, 0, 0, 0.15);
    }

    /* First name */
    .first-name {
      width: 196px;
      left: 0;
      top: 0;
    }

    /* Last name */
    .last-name {
      width: 198px;
      left: 216px; /* 969 - 753 */
      top: 0;
    }

    /* Phone */
    .phone-no {
      width: 414px;
      left: 0;
      top: 67px; /* 540 - 473 */
    }

    /* Create account button */
    .btn-create {
      position: absolute;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 414px;
      height: 47px;
      left: 40px;
      top: 221px;
      background: #FFFFFF;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 22px;
      letter-spacing: -0.02em;
      color: #111111;
      transition: opacity 0.2s;
      z-index: 2;
    }

    .btn-create:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="card">
    <span class="card-title">Enter emergency contact details</span>

    <div class="entry-fields">
      <input class="input-field first-name" type="text" placeholder="First name" />
      <input class="input-field last-name"  type="text" placeholder="Last name" />
      <input class="input-field phone-no"   type="tel"  placeholder="Enter emergency contact no." />
    </div>

    <button class="btn-create" onclick="window.location.href='view-edit-emergency-contact.html'">Start driving</button>
  </div>

</body>
</html>
