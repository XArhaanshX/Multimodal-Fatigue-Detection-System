<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergency Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; font-weight: 200;}

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: url(Background.png) center / cover no-repeat;
      overflow: hidden;
    }

    .card {
      display: flex;
      position: relative;
      width: 494px;
      height: 308px;
      background:
        linear-gradient(0deg, rgba(131, 131, 131, 0.199) -79.46%, rgba(112, 112, 112, 0.12) 20.54%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.01) 79.46%, rgba(255, 255, 255, 0.04) 179.46%);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        inset 0 -8px 24px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(28px);
      border-radius: 40px;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: 1px;
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0.15)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.4), transparent 10%),
        linear-gradient(315deg, rgba(255, 255, 255, 0.4), transparent 10%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .card-title {
      position: absolute;
      left: 40px;
      top: 40px;
      font-size: 24px;
      color: #fff;
      z-index: 2;
    }

    .entry-fields {
      position: absolute;
      width: 414px;
      left: 40px;
      top: 87px;
    }

    .input-field {
      position: absolute;
      height: 47px;
      border-radius: 10px;
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      padding: 17px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .first-name { width: 196px; left: 0; top: 0; }
    .last-name { width: 198px; left: 216px; top: 0; }
    .phone-no { width: 414px; left: 0; top: 67px; }

    .btn-create {
      position: absolute;
      width: 414px;
      height: 47px;
      left: 40px;
      top: 221px;
      background: #fff;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    .play-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .play-btn::before {
      content: '';
      border-left: 10px solid white;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 3px;
    }

  </style>
</head>
<body>

  <div class="card">
    <span class="card-title">Emergency contact</span>

    <div class="play-btn" onclick="startDriving()"></div>

    <div class="entry-fields">
      <input id="firstName" class="input-field first-name" type="text" />
      <input id="lastName" class="input-field last-name" type="text" />
      <input id="phone" class="input-field phone-no" type="tel" />
    </div>

    <button class="btn-create" onclick="saveContact()">Save changes</button>
  </div>

<script>
  // Dummy static data
  const dummyData = {
    firstName: "John",
    lastName: "Doe",
    phone: "+91 9876543210"
  };

  window.onload = function() {
    const first = document.getElementById('firstName');
    const last = document.getElementById('lastName');
    const phone = document.getElementById('phone');

    // Set dummy values
    first.value = dummyData.firstName;
    last.value = dummyData.lastName;
    phone.value = dummyData.phone;

    // Make fields readonly initially
    first.readOnly = true;
    last.readOnly = true;
    phone.readOnly = true;

    // Enable editing on click
    [first, last, phone].forEach(input => {
      input.addEventListener('click', () => {
        input.readOnly = false;
        input.focus();
      });

      // Optional: lock again when user leaves field
      input.addEventListener('blur', () => {
        input.readOnly = true;
      });
    });
  };

  function saveContact() {
    alert("Changes saved (frontend only)");
  }

  function startDriving() {
    alert("Starting driving mode...");
  }
</script>

</body>
</html>
